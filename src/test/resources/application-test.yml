spring:
  datasource:
    url: jdbc:h2:mem:eldercare_test;MODE=LEGACY;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

flowable:
  database-schema-update: true
  async-executor-activate: false
  history-level: full
  check-process-definitions: true
  process-definition-location-prefix: classpath*:/processes/
  process-definition-location-suffixes:
    - "**.bpmn20.xml"

jwt:
  secret: "test-secret-test-secret-test-secret-123"
  expirationSeconds: 7200
  issuer: "eldercare-system-test"

security:
  auth:
    block-family-elder-login: false

file:
  storage-dir: ${java.io.tmpdir}/eldercare-test-uploads
  max-size-bytes: 10485760
  allowed-extensions:
    - png
    - jpg
    - jpeg
    - pdf
    - docx

ai:
  api-key:
